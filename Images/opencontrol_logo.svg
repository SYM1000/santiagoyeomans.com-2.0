<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#21262d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Browser window frame -->
  <rect x="150" y="60" width="500" height="30" rx="8" ry="8" fill="#30363d"/>
  <circle cx="172" cy="75" r="5" fill="#ff5f56"/>
  <circle cx="192" cy="75" r="5" fill="#ffbd2e"/>
  <circle cx="212" cy="75" r="5" fill="#27c93f"/>
  <rect x="240" y="68" width="200" height="14" rx="4" fill="#161b22"/>
  <rect x="150" y="90" width="500" height="140" fill="#161b22" rx="0"/>
  <!-- Code lines inside browser -->
  <rect x="175" y="110" width="120" height="8" rx="2" fill="#388bfd" opacity="0.5"/>
  <rect x="175" y="128" width="200" height="8" rx="2" fill="#8b949e" opacity="0.3"/>
  <rect x="175" y="146" width="160" height="8" rx="2" fill="#8b949e" opacity="0.3"/>
  <rect x="175" y="164" width="180" height="8" rx="2" fill="#388bfd" opacity="0.4"/>
  <rect x="175" y="182" width="140" height="8" rx="2" fill="#8b949e" opacity="0.3"/>
  <!-- AI cursor -->
  <circle cx="560" cy="140" r="18" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.7"/>
  <circle cx="560" cy="140" r="6" fill="#58a6ff" opacity="0.8"/>
  <!-- Connection lines from AI cursor to code -->
  <line x1="545" y1="132" x2="395" y2="114" stroke="#58a6ff" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="545" y1="148" x2="375" y2="168" stroke="#58a6ff" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <!-- Logo text -->
  <text x="400" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1">OpenControl.ai</text>
  <text x="400" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(255,255,255,0.5)" text-anchor="middle">AI Browser Agent</text>
</svg>